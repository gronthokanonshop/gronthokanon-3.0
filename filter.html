<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গ্রন্থকানন</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ✅ CHANGE 2: Pro CSS Variables (already applied, keeping) */
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #1a202c;
            --text2: #718096;
            --border: #e2e8f0;
            --navbar-bg: #ffffff;
            --sidebar-bg: #ffffff;
            --search-bg: #edf2f7;
            --footer-bg: #0f172a;
            --shadow: rgba(0,0,0,0.08);
            --green: #059669;
            --green2: #10b981;
            --dark: #0f172a;
            --red: #dc2626;
            --navy: #1e3a5f;
            --gold: #d97706;
        }
        [data-theme="dark"] {
            --bg: #0a0f1e;
            --card: #111827;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --border: #1e293b;
            --navbar-bg: #111827;
            --sidebar-bg: #111827;
            --search-bg: #0a0f1e;
            --shadow: rgba(0,0,0,0.4);
        }

        /* Mobile grid */
        @media (max-width: 480px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
            .book-card img { height: 150px; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Hind Siliguri', 'SolaimanLipi', Arial, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; animation: pageIn 0.35s ease; transition: background 0.3s, color 0.3s; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        /* ✅ CHANGE 3: Pro Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #059669 100%);
            box-shadow: 0 4px 20px rgba(5,150,105,0.25);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .cart-icon { position: relative; font-size: 22px; cursor: pointer; }
        .cart-badge { position: absolute; top: -8px; right: -10px; background: var(--red); color: white; font-size: 11px; padding: 2px 6px; border-radius: 50%; font-weight: bold; }
        .dark-toggle {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 14px;
            color: #ffffff;
        }

        /* SORT BAR */
        .sort-bar { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; scrollbar-width: none; max-width: 1100px; margin: 0 auto; }
        .sort-bar::-webkit-scrollbar { display: none; }
        .sort-btn { padding: 6px 14px; background: var(--card); color: var(--text2); border: 1.5px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; font-family: 'Hind Siliguri', Arial, sans-serif; transition: 0.2s; }
        .sort-btn.active { background: var(--dark); color: white; border-color: var(--dark); }

        /* BOOK GRID */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px; max-width: 1100px; margin: 0 auto; }

        /* ✅ CHANGE 4: Pro Book Card */
        .book-card {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            border: 1px solid var(--border);
        }
        .book-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 32px rgba(5,150,105,0.2);
            border-color: var(--green);
        }
        .book-card img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .discount-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 20px;
            z-index: 2;
            box-shadow: 0 2px 6px rgba(220,38,38,0.4);
        }

        /* WISHLIST BUTTON */
        .wishlist-btn { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; z-index: 2; box-shadow: 0 2px 6px rgba(0,0,0,0.15); transition: 0.2s; }
        .wishlist-btn:hover { transform: scale(1.2); }
        .wishlist-btn.active { background: #ffe0e0; }

        .book-card-info { padding: 8px; }
        .book-card-name { font-size: 12px; font-weight: bold; color: var(--text); margin-bottom: 3px; line-height: 1.3; height: 32px; overflow: hidden; }
        .book-card-author { font-size: 11px; color: var(--text2); margin-bottom: 5px; }
        .price-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
        .price-sell { color: var(--red); font-weight: bold; font-size: 13px; }
        .price-original { color: var(--text2); font-size: 11px; text-decoration: line-through; }
        .book-card-btn {
            display: block;
            padding: 7px;
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            border: none;
            font-weight: bold;
            font-size: 11px;
            text-align: center;
            font-family: 'Hind Siliguri', Arial, sans-serif;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(5,150,105,0.3);
        }
        .book-card-btn:hover {
            background: linear-gradient(135deg, #047857, #059669);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(5,150,105,0.4);
        }

        /* SECTION HEADER */
        .section-header { padding: 16px 16px 8px; max-width: 1100px; margin: 0 auto; }
        .section-title { font-size: 18px; font-weight: 700; color: var(--dark); padding-left: 12px; border-left: 4px solid var(--green); display: flex; align-items: center; gap: 8px; }
        [data-theme="dark"] .section-title { color: #e8e8e8; }
        .section-count { font-size: 13px; color: var(--text2); font-weight: 400; }

        .empty { text-align: center; padding: 60px 20px; color: var(--text2); font-size: 16px; }

        /* FLOATING BAG */
        .float-bag { position: fixed; bottom: 25px; left: 20px; background: linear-gradient(135deg, #0f172a, #059669); color: white; padding: 12px 20px; border-radius: 30px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 20px rgba(5,150,105,0.35); z-index: 999; font-family: 'Hind Siliguri', Arial, sans-serif; display: flex; align-items: center; gap: 10px; font-size: 14px; transition: 0.3s; }
        .float-bag:hover { transform: translateY(-2px); }

        @keyframes pageOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-10px)} }
    </style>
</head>
<body>

<div class="float-bag" onclick="localStorage.setItem('gronthokanon_opencart','1'); navigateTo('index.html')">
    <span style="font-size:20px;">🛒</span>
    <div>
        <div style="font-size:11px; opacity:0.8; line-height:1;">শপিং ব্যাগ</div>
        <div style="font-size:13px; font-weight:800;"><span id="floatCount">0</span> টি বই</div>
    </div>
</div>

<div class="navbar">
    <button onclick="goBack()" style="background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); width:44px; height:44px; border-radius:50%; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:white;">‹</button>
    <img src="logo.png" alt="Logo" style="width:40px; height:40px; object-fit:contain;">
    <div style="display:flex; align-items:center; gap:8px;">
        <button class="dark-toggle" onclick="toggleDarkMode()" id="darkBtn">🌙</button>
        <div class="cart-icon" onclick="goToCart()">
            🛒<span class="cart-badge" id="cartCount">0</span>
        </div>
    </div>
</div>

<div class="section-header">
    <div class="section-title" id="sectionTitle">
        <span id="titleText"></span>
        <span class="section-count" id="countText"></span>
    </div>
</div>

<!-- SORT BAR -->
<div class="sort-bar">
    <button class="sort-btn active" onclick="sortBooks('default', this)">ডিফল্ট</button>
    <button class="sort-btn" onclick="sortBooks('price-low', this)">💰 কম দাম</button>
    <button class="sort-btn" onclick="sortBooks('price-high', this)">💎 বেশি দাম</button>
    <button class="sort-btn" onclick="sortBooks('discount', this)">🔥 বেশি ছাড়</button>
</div>

<!-- SEARCH BAR WITHIN FILTER -->
<div style="padding: 0 16px 10px; max-width:1100px; margin:0 auto;">
    <div style="display:flex; align-items:center; background:var(--card); 
        border:1.5px solid var(--border); border-radius:25px; 
        padding:8px 16px; gap:8px; box-shadow:0 2px 8px var(--shadow);">
        <span style="font-size:16px; color:var(--text2);">🔍</span>
        <input type="text" id="filterSearch" oninput="searchWithin()" 
            placeholder="এই তালিকায় খুঁজুন..." 
            style="border:none; background:transparent; outline:none; 
            width:100%; font-size:14px; 
            font-family:'Hind Siliguri', Arial, sans-serif; color:var(--text);">
        <span id="clearSearch" onclick="clearFilterSearch()" 
            style="cursor:pointer; color:var(--text2); display:none; font-size:18px;">×</span>
    </div>
</div>

<div id="mainContent"></div>

<script src="book.js"></script>
<script src="main.js"></script>
<script>

let cart = JSON.parse(localStorage.getItem('gronthokanon_cart')) || [];
let wishlist = JSON.parse(localStorage.getItem('gronthokanon_wishlist')) || [];
let filtered = [];

document.getElementById('cartCount').innerText = cart.length;
document.getElementById('floatCount').innerText = cart.length;

// DARK MODE
function toggleDarkMode() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('darkBtn').innerText = isDark ? '🌙' : '☀️';
    localStorage.setItem('gronthokanon_theme', isDark ? 'light' : 'dark');
}
const savedTheme = localStorage.getItem('gronthokanon_theme');
if (savedTheme) {
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('darkBtn').innerText = savedTheme === 'dark' ? '☀️' : '🌙';
}

function discountPct(b) {
    if (b.original_price > b.price) return Math.round((b.original_price - b.price) / b.original_price * 100);
    return 0;
}

function isWishlisted(name) { return wishlist.includes(name); }

function toggleWishlist(e, name) {
    e.stopPropagation();
    if (wishlist.includes(name)) {
        wishlist = wishlist.filter(w => w !== name);
    } else {
        wishlist.push(name);
    }
    localStorage.setItem('gronthokanon_wishlist', JSON.stringify(wishlist));
    renderBooks(filtered);
}

function makeCard(b) {
    const pct = discountPct(b);
    const idx = books.indexOf(b);
    const wl = isWishlisted(b.name);
    return `
    <div class="book-card" onclick="goToBook(${idx})">
        ${pct > 0 ? `<div class="discount-badge">${pct}% ছাড়</div>` : ''}
        <button class="wishlist-btn ${wl ? 'active' : ''}" onclick="toggleWishlist(event, '${b.name.replace(/'/g,"\\'")}')">${wl ? '❤️' : '🤍'}</button>
        <img src="${b.img}" alt="বই" loading="lazy">
        <div class="book-card-info">
            <div class="book-card-name">${b.name}</div>
            <div class="book-card-author">${b.author}</div>
            <div class="price-row">
                <span class="price-sell">৳ ${b.price}</span>
                ${b.original_price > b.price ? `<span class="price-original">৳ ${b.original_price}</span>` : ''}
            </div>
            <button class="book-card-btn" onclick="event.stopPropagation(); addToCart('${b.name.replace(/'/g,"\\'")}', ${b.price}, '${b.img}')">কার্টে যোগ করুন</button>
        </div>
    </div>`;
}

function renderBooks(list) {
    const content = document.getElementById('mainContent');
    if (list.length === 0) {
        content.innerHTML = '<div class="empty">কোনো বই পাওয়া যায়নি</div>';
    } else {
        content.innerHTML = `<div class="grid-container">${list.map(makeCard).join('')}</div>`;
    }
    document.getElementById('countText').innerText = list.length + 'টি বই';
}

function sortBooks(type, btn) {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    let sorted = [...filtered];
    if (type === 'price-low') sorted.sort((a, b) => a.price - b.price);
    else if (type === 'price-high') sorted.sort((a, b) => b.price - a.price);
    else if (type === 'discount') sorted.sort((a, b) => discountPct(b) - discountPct(a));
    renderBooks(sorted);
}

function searchWithin() {
    const q = document.getElementById('filterSearch').value.toLowerCase().trim();
    const clearBtn = document.getElementById('clearSearch');
    clearBtn.style.display = q ? 'block' : 'none';
    if (!q) { renderBooks(filtered); return; }
    const result = filtered.filter(b =>
        b.name.toLowerCase().includes(q) ||
        b.author.toLowerCase().includes(q)
    );
    renderBooks(result);
}

function clearFilterSearch() {
    document.getElementById('filterSearch').value = '';
    document.getElementById('clearSearch').style.display = 'none';
    renderBooks(filtered);
}

function goToBook(idx) {
    let recent = JSON.parse(localStorage.getItem('gronthokanon_recent')) || [];
    recent = [idx, ...recent.filter(i => i !== idx)].slice(0, 8);
    localStorage.setItem('gronthokanon_recent', JSON.stringify(recent));
    navigateTo('book.html?id=' + idx);
}

function addToCart(name, price, img) {
    cart.push({ name, price: Number(price), img });
    localStorage.setItem('gronthokanon_cart', JSON.stringify(cart));
    document.getElementById('cartCount').innerText = cart.length;
    document.getElementById('floatCount').innerText = cart.length;
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0f172a;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;';
    toast.innerText = '✅ কার্টে যোগ হয়েছে!';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function goToCart() {
    localStorage.setItem('gronthokanon_opencart', '1');
    navigateTo('index.html');
}

function navigateTo(url) {
    document.body.style.animation = 'pageOut 0.25s ease forwards';
    setTimeout(() => window.location.href = url, 250);
}

/* ✅ CHANGE 1: Back Button Fix */
function goBack() {
    navigateTo('index.html');
}

// URL params
const params = new URLSearchParams(window.location.search);
const type = params.get('type');
const value = decodeURIComponent(params.get('value') || '');

let titleIcon = '';
if (type === 'cat') { filtered = books.filter(b => b.cat === value); titleIcon = '📚'; }
else if (type === 'author') { filtered = books.filter(b => b.author === value); titleIcon = '✍️'; }
else if (type === 'pub') { filtered = books.filter(b => b.pub === value); titleIcon = '🏢'; }

document.getElementById('titleText').innerText = titleIcon + ' ' + value;

renderBooks(filtered);
</script>
</body>
</html>
