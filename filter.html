<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গ্রন্থকানন — বই খুঁজুন</title>
    <meta name="theme-color" content="#ffffff">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <script>!function(){var t=localStorage.getItem('gronthokanon_theme');if(t)document.documentElement.setAttribute('data-theme',t);}();</script>
    <style>
        
        
        
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-8px)} }

        /* NAVBAR */
        
        
        
        
        
        .page-title{flex:1;font-size:15px;font-weight:700;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        
        
        
        
        
        

        /* SEARCH ROW */
        .navbar-search{padding:0 14px 11px;}
        .search-box{display:flex;align-items:center;gap:10px;background:var(--search-input-bg);border:1.5px solid var(--search-input-border);border-radius:6px;padding:9px 14px;transition:border-color 0.2s,box-shadow 0.2s;}
        .search-box:focus-within{border-color:#059669;box-shadow:0 0 0 3px rgba(5,150,105,0.10);background:var(--card);}
        .search-icon-box{width:26px;height:26px;background:#059669;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
        .search-vline{width:1px;height:16px;background:var(--search-input-border);flex-shrink:0;}
        .search-input{flex:1;border:none;background:transparent;outline:none;font-size:13.5px;font-family:'Hind Siliguri',Arial,sans-serif;color:var(--text);}
        .search-input::placeholder{color:#9ca3af;}
        .search-clear{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;display:none;line-height:1;padding:0;}
        .search-clear.show{display:block;}

        /* SORT BAR */
        .filter-bar{display:flex;align-items:center;gap:8px;padding:10px 14px 6px;overflow-x:auto;scrollbar-width:none;max-width:1100px;margin:0 auto;}
        .filter-bar::-webkit-scrollbar{display:none;}
        .filter-label{font-size:12px;color:var(--text2);font-weight:600;white-space:nowrap;flex-shrink:0;}
        .sort-chip{padding:6px 13px;background:var(--card);color:var(--text2);border:1.5px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;font-family:'Hind Siliguri',Arial,sans-serif;transition:all 0.2s;flex-shrink:0;}
        .sort-chip:hover{border-color:#059669;color:#059669;}
        .sort-chip.active{background:#059669;color:white;border-color:transparent;box-shadow:0 2px 8px rgba(5,150,105,0.28);}

        /* RESULT BAR */
        .result-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px 6px;max-width:1100px;margin:0 auto;}
        .section-title{font-size:15px;font-weight:700;color:var(--dark);padding-left:10px;border-left:3px solid #059669;}
        .result-count{font-size:12px;color:var(--text2);font-weight:600;background:var(--card);border:1px solid var(--border);padding:3px 10px;border-radius:20px;white-space:nowrap;}

        /* BOOK GRID */
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:10px 14px;max-width:1100px;margin:0 auto;}
        @media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}.book-card img{height:155px;}}

        .book-card{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 2px 10px var(--shadow);transition:all 0.3s cubic-bezier(0.4,0,0.2,1);cursor:pointer;position:relative;border:1px solid var(--border);animation:cardIn 0.3s ease both;}
        @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .book-card:hover{transform:translateY(-5px);box-shadow:0 12px 28px rgba(5,150,105,0.18);border-color:#059669;}
        .book-card img{width:100%;height:175px;object-fit:cover;display:block;}
        .disc-badge{position:absolute;top:7px;left:7px;background:linear-gradient(135deg,#dc2626,#ef4444);color:white;font-size:10px;font-weight:bold;padding:2px 7px;border-radius:20px;z-index:2;box-shadow:0 2px 6px rgba(220,38,38,0.35);}
        .wl-btn{position:absolute;top:7px;right:7px;background:rgba(255,255,255,0.92);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,0.12);transition:transform 0.2s;}
        .wl-btn:hover{transform:scale(1.2);}
        .wl-btn.active{background:#ffe4e4;}
        .bc-info{padding:8px 9px 9px;}
        .bc-pub{font-size:10px;color:var(--text2);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .bc-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.3;height:31px;overflow:hidden;}
        .bc-author{font-size:11px;color:var(--text2);margin-bottom:5px;}
        .price-row{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap;}
        .price-sell{color:var(--red);font-weight:bold;font-size:13px;}
        .price-orig{color:var(--text2);font-size:11px;text-decoration:line-through;}
        .bc-btn{display:block;padding:6px;background:linear-gradient(135deg,#059669,#10b981);color:white;border-radius:8px;cursor:pointer;width:100%;border:none;font-weight:bold;font-size:11px;text-align:center;font-family:'Hind Siliguri',Arial,sans-serif;transition:all 0.2s;box-shadow:0 2px 8px rgba(5,150,105,0.25);}
        .bc-btn:hover{background:linear-gradient(135deg,#047857,#059669);transform:translateY(-1px);}

        /* SKELETON */
        .skel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:10px 14px;max-width:1100px;margin:0 auto;}
        @media(max-width:480px){.skel-grid{grid-template-columns:repeat(2,1fr);}}
        .skel-card{background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border);}
        .skel-img{height:175px;background:linear-gradient(90deg,#e8f5ee 25%,#f0fdf4 50%,#e8f5ee 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
        [data-theme="dark"] .skel-img{background:linear-gradient(90deg,#132d20 25%,#1a4731 50%,#132d20 75%);background-size:200% 100%;}
        .skel-line{height:11px;margin:9px;border-radius:6px;background:linear-gradient(90deg,#e8f5ee 25%,#f0fdf4 50%,#e8f5ee 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
        [data-theme="dark"] .skel-line{background:linear-gradient(90deg,#132d20 25%,#1a4731 50%,#132d20 75%);background-size:200% 100%;}
        .skel-line.s{width:60%;}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

        /* EMPTY STATE */
        .empty-state{text-align:center;padding:70px 30px;animation:pageIn 0.4s ease;}
        .empty-icon{font-size:56px;margin-bottom:14px;animation:float 2.5s ease-in-out infinite;}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .empty-title{font-size:17px;font-weight:700;color:var(--dark);margin-bottom:6px;}
        .empty-sub{font-size:14px;color:var(--text2);margin-bottom:20px;}
        .empty-btn{display:inline-block;padding:10px 24px;background:#059669;color:white;border-radius:25px;cursor:pointer;font-weight:700;font-size:14px;font-family:'Hind Siliguri',Arial,sans-serif;box-shadow:0 4px 14px rgba(5,150,105,0.3);transition:transform 0.2s,box-shadow 0.2s;}
        .empty-btn:hover{transform:translateY(-2px);}

        /* FLOAT CART */
        .float-cart{position:fixed;bottom:24px;left:16px;background:linear-gradient(135deg,#064e3b,#059669);color:white;padding:11px 18px;border-radius:30px;cursor:pointer;font-weight:700;box-shadow:0 4px 18px rgba(5,150,105,0.4);z-index:997;font-family:'Hind Siliguri',Arial,sans-serif;display:flex;align-items:center;gap:10px;font-size:14px;transition:transform 0.2s,box-shadow 0.2s;}
        .float-cart:hover{transform:translateY(-2px);}

        /* SCROLL TOP */
        
        
        

        /* WHATSAPP */
        
        

        /* TOAST */
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#059669;color:white;padding:10px 22px;border-radius:25px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 14px rgba(5,150,105,0.35);animation:toastIn 0.3s ease;}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-top">
        <div style="flex:1;display:flex;align-items:center;gap:8px;min-width:0;">
            <button class="back-btn" onclick="goBack()">‹</button>
            <div class="page-title" id="pageTitle">বই খুঁজছি...</div>
        </div>
        <div class="navbar-icons">
            <button class="dark-pill" onclick="toggleDark()" id="darkBtn">🌙</button>
            <div class="nav-btn" onclick="goToCart()" title="কার্ট" style="position:relative;">
                🛒<span class="cart-badge-nav" id="cartCount">0</span>
            </div>
        </div>
    </div>
    <div class="navbar-search">
        <div class="search-box">
            <div class="search-icon-box">🔍</div>
            <div class="search-vline"></div>
            <input type="text" class="search-input" id="filterSearch" oninput="searchWithin()" placeholder="এই তালিকায় খুঁজুন...">
            <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
        </div>
    </div>
</nav>

<div class="filter-bar">
    <span class="filter-label">সাজান:</span>
    <button class="sort-chip active" onclick="sortBooks('default',this)">ডিফল্ট</button>
    <button class="sort-chip" onclick="sortBooks('price-low',this)">💰 কম দামে</button>
    <button class="sort-chip" onclick="sortBooks('price-high',this)">💎 বেশি দামে</button>
    <button class="sort-chip" onclick="sortBooks('discount',this)">🔥 বেশি ছাড়ে</button>
    <button class="sort-chip" onclick="sortBooks('alpha',this)">🔤 নাম অনুযায়ী</button>
</div>

<div class="result-bar">
    <div class="section-title" id="titleText"></div>
    <div class="result-count" id="countText">লোড হচ্ছে...</div>
</div>

<div id="mainContent">
    <div class="skel-grid" id="skelGrid">
        <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line s"></div><div class="skel-line"></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line s"></div><div class="skel-line"></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line s"></div><div class="skel-line"></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line s"></div><div class="skel-line"></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line s"></div><div class="skel-line"></div></div>
        <div class="skel-card"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line s"></div><div class="skel-line"></div></div>
    </div>
    <div id="bookGrid" style="display:none;"></div>
</div>

<div class="float-cart" onclick="goToCart()">
    <span style="font-size:20px;">🛍️</span>
    <div><div style="font-size:11px;opacity:0.8;line-height:1;">শপিং ব্যাগ</div><div style="font-size:13px;font-weight:800;"><span id="floatCount">0</span> টি বই</div></div>
</div>
<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<a href="https://wa.me/8801516595762" target="_blank" class="wa-btn">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WA" style="width:26px;">
</a>

<script src="book.js"></script>
<script src="main.js"></script>
<script>
let cart=JSON.parse(localStorage.getItem('gronthokanon_cart'))||[];
let wishlist=JSON.parse(localStorage.getItem('gronthokanon_wishlist'))||[];
let filtered=[],currentSort='default';

function updateCounts(){const c=cart.length;document.getElementById('cartCount').innerText=c;document.getElementById('floatCount').innerText=c;}
updateCounts();

function discPct(b){return b.original_price>b.price?Math.round((b.original_price-b.price)/b.original_price*100):0;}
function isWL(name){return wishlist.includes(name);}
function toggleWL(e,name){
    e.stopPropagation();
    wishlist.includes(name)?wishlist=wishlist.filter(w=>w!==name):wishlist.push(name);
    localStorage.setItem('gronthokanon_wishlist',JSON.stringify(wishlist));
    renderBooks(getList());
}

function makeCard(b,delay){
    const pct=discPct(b),idx=books.indexOf(b),wl=isWL(b.name);
    return `<div class="book-card" onclick="goToBook(${idx})" style="animation-delay:${delay*0.04}s">
        ${pct>0?`<div class="disc-badge">${pct}% ছাড়</div>`:''}
        <button class="wl-btn ${wl?'active':''}" onclick="toggleWL(event,'${b.name.replace(/'/g,"\\'")}')">${wl?'❤️':'🤍'}</button>
        <img src="${b.img}" alt="বই" loading="lazy">
        <div class="bc-info">
            <div class="bc-pub">🏢 ${b.pub}</div>
            <div class="bc-name">${b.name}</div>
            <div class="bc-author">✍️ ${b.author}</div>
            <div class="price-row"><span class="price-sell">৳ ${b.price}</span>${b.original_price>b.price?`<span class="price-orig">৳ ${b.original_price}</span>`:''}</div>
            <button class="bc-btn" onclick="event.stopPropagation();addToCart('${b.name.replace(/'/g,"\\'")}',${b.price},'${b.img}')">কার্টে যোগ করুন</button>
        </div></div>`;
}

function renderBooks(list){
    const grid=document.getElementById('bookGrid');
    document.getElementById('countText').innerText=list.length+'টি বই';
    if(!list.length){
        grid.innerHTML=`<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">কোনো বই পাওয়া যায়নি</div><div class="empty-sub">অন্য কিছু দিয়ে খোঁজার চেষ্টা করুন</div><div class="empty-btn" onclick="clearSearch()">🔄 সব দেখুন</div></div>`;
        return;
    }
    grid.innerHTML=`<div class="grid">${list.map((b,i)=>makeCard(b,i)).join('')}</div>`;
}

function getList(){
    const q=document.getElementById('filterSearch').value.normalize("NFC").toLowerCase().trim();
    let list=q?filtered.filter(b=>b.name.normalize("NFC").toLowerCase().includes(q)||b.author.normalize("NFC").toLowerCase().includes(q)):[...filtered];
    if(currentSort==='price-low')list.sort((a,b)=>a.price-b.price);
    else if(currentSort==='price-high')list.sort((a,b)=>b.price-a.price);
    else if(currentSort==='discount')list.sort((a,b)=>discPct(b)-discPct(a));
    else if(currentSort==='alpha')list.sort((a,b)=>a.name.localeCompare(b.name,'bn'));
    return list;
}

function sortBooks(type,btn){document.querySelectorAll('.sort-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentSort=type;renderBooks(getList());}
function searchWithin(){document.getElementById('searchClear').classList.toggle('show',document.getElementById('filterSearch').value.length>0);renderBooks(getList());}
function clearSearch(){document.getElementById('filterSearch').value='';document.getElementById('searchClear').classList.remove('show');renderBooks(getList());}

function goToBook(idx){
    let r=JSON.parse(localStorage.getItem('gronthokanon_recent'))||[];
    r=[idx,...r.filter(i=>i!==idx)].slice(0,8);
    localStorage.setItem('gronthokanon_recent',JSON.stringify(r));
    navigateTo('book.html?id='+idx);
}
function addToCart(name,price,img){
    cart.push({name:name.trim(),price:Number(price),img});
    localStorage.setItem('gronthokanon_cart',JSON.stringify(cart));
    updateCounts();showToast('✅ কার্টে যোগ হয়েছে!');
}
function showToast(msg){
    const t=document.createElement('div');t.className='toast';t.innerText=msg;
    document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}
function goToCart(){localStorage.setItem('gronthokanon_opencart','1');navigateTo('index.html');}
function goBack(){window.history.back();}

const params=new URLSearchParams(window.location.search);
const type=params.get('type'),value=decodeURIComponent(params.get('value')||'');
const iconMap={cat:'📚',author:'✍️',pub:'🏢'};
if(type==='cat')filtered=books.filter(b=>b.cat===value);
else if(type==='author')filtered=books.filter(b=>b.author===value);
else if(type==='pub')filtered=books.filter(b=>b.pub===value);
document.getElementById('titleText').innerText=(iconMap[type]||'📚')+' '+value;
document.getElementById('pageTitle').innerText=value;
setTimeout(()=>{document.getElementById('skelGrid').style.display='none';document.getElementById('bookGrid').style.display='block';renderBooks(getList());},600);
</script>
<script src="common.js"></script>
</body>
</html>
