<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গ্রন্থকানন - সব বই</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #edf2f7;
            --card: #ffffff;
            --text: #333333;
            --text2: #888888;
            --border: #e0e0e0;
            --navbar-bg: #ffffff;
            --shadow: rgba(0,0,0,0.07);
            --green: #27ae60;
            --dark: #2c3e50;
            --red: #e74c3c;
        }
        [data-theme="dark"] {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --text: #e8e8e8;
            --text2: #aaaaaa;
            --border: #2a2a3e;
            --navbar-bg: #1a1a2e;
            --shadow: rgba(0,0,0,0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* ====== PRO TRANSITIONS ====== */
        @keyframes pageLoad { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        body { 
            font-family: 'Hind Siliguri', 'SolaimanLipi', Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            overflow-x: hidden; 
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: pageLoad 0.6s ease-out;
        }
        
        ::selection { background: var(--green); color: white; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 4px; transition: background 0.3s; }
        ::-webkit-scrollbar-thumb:hover { background: #1a8244; }

        /* NAVBAR */
        @keyframes navSlideDown { 
            from { transform: translateY(-50px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        .navbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 16px; 
            background: var(--navbar-bg); 
            box-shadow: 0 2px 10px var(--shadow); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: navSlideDown 0.5s ease-out;
        }
        .navbar-title { 
            font-size: 16px; 
            font-weight: 700; 
            color: var(--dark);
            transition: color 0.3s;
        }
        [data-theme="dark"] .navbar-title { color: #e8e8e8; }
        
        .cart-icon { 
            position: relative; 
            font-size: 22px; 
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .cart-icon:hover { transform: scale(1.15) rotate(5deg); }
        .cart-icon:active { transform: scale(0.95); }
        
        .cart-badge { 
            position: absolute; 
            top: -8px; 
            right: -10px; 
            background: var(--red); 
            color: white; 
            font-size: 11px; 
            padding: 2px 6px; 
            border-radius: 50%; 
            font-weight: bold;
            animation: bounce 0.4s ease;
        }
        @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
        
        .dark-toggle { 
            background: none; 
            border: 2px solid var(--border); 
            border-radius: 20px; 
            padding: 4px 10px; 
            cursor: pointer; 
            font-size: 14px; 
            color: var(--text); 
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .dark-toggle:hover { 
            border-color: var(--green);
            transform: rotate(15deg) scale(1.05);
        }

        /* SORT BAR */
        @keyframes sortBarSlide {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sort-bar { 
            display: flex; 
            gap: 8px; 
            padding: 10px 16px; 
            overflow-x: auto; 
            scrollbar-width: none; 
            max-width: 1100px; 
            margin: 0 auto;
            animation: sortBarSlide 0.5s ease-out 0.2s both;
        }
        .sort-bar::-webkit-scrollbar { display: none; }
        
        @keyframes btnHover {
            0% { transform: translateY(0); }
            100% { transform: translateY(-3px); }
        }
        .sort-btn { 
            padding: 6px 14px; 
            background: var(--card); 
            color: var(--text2); 
            border: 1.5px solid var(--border); 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: 600; 
            white-space: nowrap; 
            font-family: 'Hind Siliguri', Arial, sans-serif; 
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .sort-btn:hover:not(.active) { 
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.15);
            border-color: var(--green);
        }
        .sort-btn.active { 
            background: var(--dark); 
            color: white; 
            border-color: var(--dark);
            animation: btnHover 0.4s ease-out;
        }

        /* BOOK GRID */
        @keyframes cardFadeIn { 
            from { opacity: 0; transform: translateY(30px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        @keyframes cardShine {
            0% { transform: translateX(-100%) translateY(-100%); }
            100% { transform: translateX(100%) translateY(100%); }
        }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            padding: 16px; 
            padding-bottom: 90px; 
            max-width: 1100px; 
            margin: 0 auto;
        }
        
        .book-card { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 10px var(--shadow); 
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer; 
            position: relative;
            animation: cardFadeIn 0.6s ease-out both;
        }
        .book-card:nth-child(1) { animation-delay: 0.05s; }
        .book-card:nth-child(2) { animation-delay: 0.1s; }
        .book-card:nth-child(3) { animation-delay: 0.15s; }
        .book-card:nth-child(4) { animation-delay: 0.2s; }
        .book-card:nth-child(5) { animation-delay: 0.25s; }
        .book-card:nth-child(6) { animation-delay: 0.3s; }
        .book-card:nth-child(7) { animation-delay: 0.35s; }
        .book-card:nth-child(8) { animation-delay: 0.4s; }
        .book-card:nth-child(9) { animation-delay: 0.45s; }
        
        .book-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 1;
            pointer-events: none;
        }
        .book-card:hover::before {
            opacity: 1;
            animation: cardShine 0.6s ease-in-out;
        }
        
        .book-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            box-shadow: 0 15px 35px rgba(39, 174, 96, 0.25);
        }
        
        .book-card img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            display: block;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .book-card:hover img { transform: scale(1.05); }
        
        .discount-badge { 
            position: absolute; 
            top: 8px; 
            left: 8px; 
            background: var(--red); 
            color: white; 
            font-size: 11px; 
            font-weight: bold; 
            padding: 3px 7px; 
            border-radius: 20px; 
            z-index: 2;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* WISHLIST BUTTON */
        .wishlist-btn { 
            position: absolute; 
            top: 8px; 
            right: 8px; 
            background: rgba(255,255,255,0.9); 
            border: none; 
            border-radius: 50%; 
            width: 28px; 
            height: 28px; 
            cursor: pointer; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 2; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.15); 
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .wishlist-btn:hover { transform: scale(1.2); }
        .wishlist-btn.active { 
            background: #ffe0e0;
            animation: heartBeat 0.4s;
        }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1.1); }
        }

        /* CARD INFO */
        .book-card-info { 
            padding: 8px; 
            transition: all 0.3s ease;
        }
        .book-card-name { 
            font-size: 12px; 
            font-weight: bold; 
            color: var(--text); 
            margin-bottom: 3px; 
            line-height: 1.3; 
            height: 32px; 
            overflow: hidden;
        }
        .book-card-author { 
            font-size: 11px; 
            color: var(--text2); 
            margin-bottom: 5px; 
        }
        .price-row { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            margin-bottom: 8px;
        }
        .price-sell { 
            color: var(--red); 
            font-weight: bold; 
            font-size: 13px;
            transition: all 0.3s ease;
        }
        .book-card:hover .price-sell {
            font-size: 14px;
        }
        .price-original { 
            color: var(--text2); 
            font-size: 11px; 
            text-decoration: line-through;
        }
        
        .book-card-btn { 
            display: block; 
            padding: 7px; 
            background: var(--green); 
            color: white; 
            border-radius: 6px; 
            cursor: pointer; 
            width: 100%; 
            border: none; 
            font-weight: bold; 
            font-size: 12px; 
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-align: center; 
            font-family: 'Hind Siliguri', Arial, sans-serif;
        }
        .book-card-btn:hover { 
            background: #1a8244;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }
        .book-card-btn:active { transform: scale(0.95); }

        /* FLOATING BUTTON */
        .floating-cart { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            width: 55px; 
            height: 55px; 
            background: linear-gradient(135deg, #1a1a2e, #27ae60); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 26px; 
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.4); 
            z-index: 500;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .floating-cart:hover { 
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(39, 174, 96, 0.5);
        }
        .floating-cart:active { transform: scale(0.95); }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .grid-container { grid-template-columns: 1fr; }
            .book-card { width: 100%; }
            .book-card img { height: 200px; }
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <div class="navbar">
        <button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>
        <div class="navbar-title">সব বই</div>
        <div class="cart-icon" onclick="goToCart()">
            🛒
            <span class="cart-badge" id="cartBadge">0</span>
        </div>
    </div>

    <!-- SORT BAR -->
    <div class="sort-bar">
        <button class="sort-btn active" onclick="sortBooks('default')">সব</button>
        <button class="sort-btn" onclick="sortBooks('low')">কম দাম</button>
        <button class="sort-btn" onclick="sortBooks('high')">বেশি দাম</button>
        <button class="sort-btn" onclick="sortBooks('discount')">বেশি ছাড়</button>
    </div>

    <!-- BOOK GRID -->
    <div class="grid-container" id="bookGrid"></div>

    <!-- FLOATING CART -->
    <div class="floating-cart" onclick="goToCart()">🛒</div>

    <script>
        // সব Books Data
        const books = [
            { name: "স্টর্ম অব স্টিল", author: "হেনরি কিসিঞ্জার", price: 360, original_price: 480, cat: "বেস্ট সেলিং", pub: "সত্যায়ন প্রকাশনী", pages: "320 পৃষ্ঠা", stock: "15 কপি", img: "1", desc: "শীঘ্রই আপডেট করা হবে" },
            { name: "অনেক আঁধার পেরিয়ে", author: "ড. জাকির নায়েক", price: 240, original_price: 360, cat: "রানিং ট্রেন্ডিং", pub: "সত্যায়ন প্রকাশনী", pages: "192 পৃষ্ঠা", stock: "20 কপি", img: "2", desc: "শীঘ্রই আপডেট করা হবে" },
            { name: "ঘ্যাচাং সিরিজ ১", author: "রিচার্ড ইয়েটস", price: 180, original_price: 300, cat: "নতুন প্রকাশিত", pub: "সত্যায়ন প্রকাশনী", pages: "224 পৃষ্ঠা", stock: "10 কপি", img: "3", desc: "শীঘ্রই আপডেট করা হবে" },
            { name: "সৃজনশীলতার সিক্রেট", author: "এডাম গ্রান্ট", price: 280, original_price: 380, cat: "জনপ্রিয় লেখক", pub: "সত্যায়ন প্রকাশনী", pages: "256 পৃষ্ঠা", stock: "12 কপি", img: "4", desc: "শীঘ্রই আপডেট করা হবে" },
            { name: "চুরি করুন শিল্পীর মতো", author: "অস্টিন ক্লিয়ন", price: 240, original_price: 320, cat: "জনপ্রিয় বই", pub: "সত্যায়ন প্রকাশনী", pages: "192 পৃষ্ঠা", stock: "18 কপি", img: "5", desc: "শীঘ্রই আপডেট করা হবে" },
            { name: "নিজের ঢোল পেটান", author: "মোহাম্মাদ তোয়াহা আকবর", price: 200, original_price: 280, cat: "আত্মশুদ্ধি ও অনুপ্রেরণা", pub: "সত্যায়ন প্রকাশনী", pages: "160 পৃষ্ঠা", stock: "14 কপি", img: "6", desc: "শীঘ্রই আপডেট করা হবে" },
            { name: "লেগে থাকুন", author: "এঞ্জেলা ডাকওয়ার্থ", price: 260, original_price: 360, cat: "সীরাতে রাসূল (সা.)", pub: "সত্যায়ন প্রকাশনী", pages: "208 পৃষ্ঠা", stock: "11 কপি", img: "7", desc: "শীঘ্রই আপডেট করা হবে" },
            { name: "এক নজরে কুরআন", author: "আল্লামা সফিউর রহমান মুবারকপুরী", price: 320, original_price: 420, cat: "কুরআন বিষয়ক আলোচনা", pub: "সত্যায়ন প্রকাশনী", pages: "256 পৃষ্ঠা", stock: "16 কপি", img: "8", desc: "শীঘ্রই আপডেট করা হবে" },
            { name: "প্রচেষ্টা", author: "শায়খ মোখতার আহমাদ", price: 180, original_price: 240, cat: "মহীয়সী নারী জীবনী", pub: "সত্যায়ন প্রকাশনী", pages: "144 পৃষ্ঠা", stock: "22 কপি", img: "9", desc: "শীঘ্রই আপডেট করা হবে" },
            { name: "ফী আমানিল্লাহ", author: "আবদুল্লাহ আল মাসউদ", price: 240, original_price: 320, cat: "সাহাবীদের জীবনী", pub: "সত্যায়ন প্রকাশনী", pages: "192 পৃষ্ঠা", stock: "13 কপি", img: "10", desc: "শীঘ্রই আপডেট করা হবে" },
            { name: "উম্মতের তালিকায় নাম কাটা যাদের", author: "ইমাম ইবনুল কায়্যিম", price: 280, original_price: 380, cat: "পারিবারিক জীবন", pub: "সত্যায়ন প্রকাশনী", pages: "224 পৃষ্ঠা", stock: "9 কপি", img: "11", desc: "শীঘ্রই আপডেট করা হবে" },
            { name: "ইনকাম অ্যান্ড মাইন্ডসেট", author: "ড. খালিদ আবু শাদি", price: 220, original_price: 300, cat: "ইসলামি আদর্শ ও মতবাদ", pub: "সত্যায়ন প্রকাশনী", pages: "176 পৃষ্ঠা", stock: "17 কপি", img: "12", desc: "শীঘ্রই আপডেট করা হবে" },
        ];

        let cartCount = 0;
        let currentSort = 'default';

        function displayBooks(sortType = 'default') {
            let sortedBooks = [...books];
            
            if (sortType === 'low') sortedBooks.sort((a, b) => a.price - b.price);
            else if (sortType === 'high') sortedBooks.sort((a, b) => b.price - a.price);
            else if (sortType === 'discount') sortedBooks.sort((a, b) => {
                const discA = ((b.original_price - b.price) / b.original_price) * 100;
                const discB = ((b.original_price - a.price) / b.original_price) * 100;
                return discA - discB;
            });

            const grid = document.getElementById('bookGrid');
            grid.innerHTML = sortedBooks.map((book, i) => {
                const discount = Math.round(((book.original_price - book.price) / book.original_price) * 100);
                return `
                    <div class="book-card">
                        <button class="wishlist-btn" onclick="toggleWishlist(this, ${i})">🤍</button>
                        <div class="discount-badge">${discount}% ছাড়</div>
                        <img src="https://via.placeholder.com/150x200?text=${book.name.slice(0,10)}" alt="${book.name}" onclick="goToBook(${i})">
                        <div class="book-card-info">
                            <div class="book-card-name">${book.name}</div>
                            <div class="book-card-author">${book.author}</div>
                            <div class="price-row">
                                <span class="price-sell">৳${book.price}</span>
                                <span class="price-original">৳${book.original_price}</span>
                            </div>
                            <button class="book-card-btn" onclick="addToCart(${i})">কিনুন</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addToCart(idx) {
            localStorage.setItem('gronthokanon_opencart', '1');
            const cartData = JSON.parse(localStorage.getItem('gronthokanon_cart') || '[]');
            const book = books[idx];
            const existing = cartData.find(item => item.name === book.name);
            if (existing) existing.quantity++;
            else cartData.push({ ...book, quantity: 1 });
            localStorage.setItem('gronthokanon_cart', JSON.stringify(cartData));
            updateCartBadge();
        }

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('gronthokanon_cart') || '[]');
            cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartBadge').textContent = cartCount;
        }

        function toggleWishlist(btn, idx) {
            btn.classList.toggle('active');
            const wishlist = JSON.parse(localStorage.getItem('gronthokanon_wishlist') || '[]');
            const book = books[idx];
            const idx2 = wishlist.findIndex(item => item.name === book.name);
            if (idx2 >= 0) wishlist.splice(idx2, 1);
            else wishlist.push(book);
            localStorage.setItem('gronthokanon_wishlist', JSON.stringify(wishlist));
        }

        function sortBooks(type) {
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentSort = type;
            displayBooks(type);
        }

        function goToCart() {
            localStorage.setItem('gronthokanon_opencart', '1');
            window.location.href = 'index.html';
        }

        function goToBook(idx) {
            localStorage.setItem('gronthokanon_selectedbook', idx);
            window.location.href = 'book.html';
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('gronthokanon_theme', isDark ? 'light' : 'dark');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const theme = localStorage.getItem('gronthokanon_theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
            displayBooks();
            updateCartBadge();
        });
    </script>
</body>
</html>
