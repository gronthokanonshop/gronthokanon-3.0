<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গ্রন্থকানন</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #edf2f7;
            --card: #ffffff;
            --text: #333333;
            --text2: #888888;
            --border: #e0e0e0;
            --navbar-bg: #ffffff;
            --shadow: rgba(0,0,0,0.07);
            --green: #27ae60;
            --dark: #2c3e50;
            --red: #e74c3c;
        }
        [data-theme="dark"] {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --text: #e8e8e8;
            --text2: #aaaaaa;
            --border: #2a2a3e;
            --navbar-bg: #1a1a2e;
            --shadow: rgba(0,0,0,0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Hind Siliguri', 'SolaimanLipi', Arial, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; animation: pageIn 0.35s ease; transition: background 0.3s, color 0.3s; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        /* NAVBAR */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: var(--navbar-bg); box-shadow: 0 2px 10px var(--shadow); position: sticky; top: 0; z-index: 100; transition: background 0.3s; }
        .navbar-title { font-size: 16px; font-weight: 700; color: var(--dark); }
        [data-theme="dark"] .navbar-title { color: #e8e8e8; }
        .cart-icon { position: relative; font-size: 22px; cursor: pointer; }
        .cart-badge { position: absolute; top: -8px; right: -10px; background: var(--red); color: white; font-size: 11px; padding: 2px 6px; border-radius: 50%; font-weight: bold; }
        .dark-toggle { background: none; border: 2px solid var(--border); border-radius: 20px; padding: 4px 10px; cursor: pointer; font-size: 14px; color: var(--text); transition: 0.2s; }

        /* SORT BAR */
        .sort-bar { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; scrollbar-width: none; max-width: 1100px; margin: 0 auto; }
        .sort-bar::-webkit-scrollbar { display: none; }
        .sort-btn { padding: 6px 14px; background: var(--card); color: var(--text2); border: 1.5px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; font-family: 'Hind Siliguri', Arial, sans-serif; transition: 0.2s; }
        .sort-btn.active { background: var(--dark); color: white; border-color: var(--dark); }

        /* BOOK GRID */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px; max-width: 1100px; margin: 0 auto; }
        .book-card { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px var(--shadow); transition: 0.3s; cursor: pointer; position: relative; }
        .book-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .book-card img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .discount-badge { position: absolute; top: 8px; left: 8px; background: var(--red); color: white; font-size: 11px; font-weight: bold; padding: 3px 7px; border-radius: 20px; z-index: 2; }

        /* WISHLIST BUTTON */
        .wishlist-btn { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; z-index: 2; box-shadow: 0 2px 6px rgba(0,0,0,0.15); transition: 0.2s; }
        .wishlist-btn:hover { transform: scale(1.2); }
        .wishlist-btn.active { background: #ffe0e0; }

        .book-card-info { padding: 8px; }
        .book-card-name { font-size: 12px; font-weight: bold; color: var(--text); margin-bottom: 3px; line-height: 1.3; height: 32px; overflow: hidden; }
        .book-card-author { font-size: 11px; color: var(--text2); margin-bottom: 5px; }
        .price-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
        .price-sell { color: var(--red); font-weight: bold; font-size: 13px; }
        .price-original { color: var(--text2); font-size: 11px; text-decoration: line-through; }
        .book-card-btn { display: block; padding: 7px; background: var(--green); color: white; border-radius: 6px; cursor: pointer; width: 100%; border: none; font-weight: bold; font-size: 11px; text-align: center; font-family: 'Hind Siliguri', Arial, sans-serif; transition: 0.2s; }
        .book-card-btn:hover { background: #219150; }

        /* SECTION HEADER */
        .section-header { padding: 16px 16px 8px; max-width: 1100px; margin: 0 auto; }
        .section-title { font-size: 18px; font-weight: 700; color: var(--dark); padding-left: 12px; border-left: 4px solid var(--green); display: flex; align-items: center; gap: 8px; }
        [data-theme="dark"] .section-title { color: #e8e8e8; }
        .section-count { font-size: 13px; color: var(--text2); font-weight: 400; }

        .empty { text-align: center; padding: 60px 20px; color: var(--text2); font-size: 16px; }

        /* FLOATING BAG */
        .float-bag { position: fixed; bottom: 25px; left: 20px; background: linear-gradient(135deg, #1a1a2e, #27ae60); color: white; padding: 12px 20px; border-radius: 30px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 20px rgba(26,26,46,0.45); z-index: 999; font-family: 'Hind Siliguri', Arial, sans-serif; display: flex; align-items: center; gap: 10px; font-size: 14px; transition: 0.3s; }
        .float-bag:hover { transform: translateY(-2px); }

        @keyframes pageOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-10px)} }
    </style>
</head>

let cart = JSON.parse(localStorage.getItem('gronthokanon_cart')) || [];
let wishlist = JSON.parse(localStorage.getItem('gronthokanon_wishlist')) || [];
let filtered = [];

// Update counts
document.getElementById('cartCount').innerText = cart.length;
document.getElementById('floatCount').innerText = cart.length;

// DARK MODE
function toggleDarkMode() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('darkBtn').innerText = isDark ? '🌙' : '☀️';
    localStorage.setItem('gronthokanon_theme', isDark ? 'light' : 'dark');
}
const savedTheme = localStorage.getItem('gronthokanon_theme');
if (savedTheme) {
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('darkBtn').innerText = savedTheme === 'dark' ? '☀️' : '🌙';
}

function discountPct(b) {
    if (b.original_price > b.price) return Math.round((b.original_price - b.price) / b.original_price * 100);
    return 0;
}

function isWishlisted(name) { return wishlist.includes(name); }

function toggleWishlist(e, name) {
    e.stopPropagation();
    if (wishlist.includes(name)) {
        wishlist = wishlist.filter(w => w !== name);
    } else {
        wishlist.push(name);
    }
    localStorage.setItem('gronthokanon_wishlist', JSON.stringify(wishlist));
    renderBooks(filtered);
}

function makeCard(b) {
    const pct = discountPct(b);
    const idx = books.indexOf(b);
    const wl = isWishlisted(b.name);
    return `
    <div class="book-card" onclick="goToBook(${idx})">
        ${pct > 0 ? `<div class="discount-badge">${pct}% ছাড়</div>` : ''}
        <button class="wishlist-btn ${wl ? 'active' : ''}" onclick="toggleWishlist(event, '${b.name.replace(/'/g,"\\'")}')">${wl ? '❤️' : '🤍'}</button>
        <img src="${b.img}" alt="বই" loading="lazy">
        <div class="book-card-info">
            <div class="book-card-name">${b.name}</div>
            <div class="book-card-author">${b.author}</div>
            <div class="price-row">
                <span class="price-sell">৳ ${b.price}</span>
                ${b.original_price > b.price ? `<span class="price-original">৳ ${b.original_price}</span>` : ''}
            </div>
            <button class="book-card-btn" onclick="event.stopPropagation(); addToCart('${b.name.replace(/'/g,"\\'")}', ${b.price}, '${b.img}')">কার্টে যোগ করুন</button>
        </div>
    </div>`;
}

function renderBooks(list) {
    const content = document.getElementById('mainContent');
    if (list.length === 0) {
        content.innerHTML = '<div class="empty">কোনো বই পাওয়া যায়নি</div>';
    } else {
        content.innerHTML = `<div class="grid-container">${list.map(makeCard).join('')}</div>`;
    }
    document.getElementById('countText').innerText = list.length + 'টি বই';
}

function sortBooks(type, btn) {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    let sorted = [...filtered];
    if (type === 'price-low') sorted.sort((a, b) => a.price - b.price);
    else if (type === 'price-high') sorted.sort((a, b) => b.price - a.price);
    else if (type === 'discount') sorted.sort((a, b) => discountPct(b) - discountPct(a));
    renderBooks(sorted);
}

function goToBook(idx) {
    let recent = JSON.parse(localStorage.getItem('gronthokanon_recent')) || [];
    recent = [idx, ...recent.filter(i => i !== idx)].slice(0, 8);
    localStorage.setItem('gronthokanon_recent', JSON.stringify(recent));
    navigateTo('book.html?id=' + idx);
}

function addToCart(name, price, img) {
    cart.push({ name, price: Number(price), img });
    localStorage.setItem('gronthokanon_cart', JSON.stringify(cart));
    document.getElementById('cartCount').innerText = cart.length;
    document.getElementById('floatCount').innerText = cart.length;
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2c3e50;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;';
    toast.innerText = '✅ কার্টে যোগ হয়েছে!';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function goToCart() {
    localStorage.setItem('gronthokanon_opencart', '1');
    navigateTo('index.html');
}

function navigateTo(url) {
    document.body.style.animation = 'pageOut 0.25s ease forwards';
    setTimeout(() => window.location.href = url, 250);
}

function goBack() {
    window.history.back();
}

// URL params
const params = new URLSearchParams(window.location.search);
const type = params.get('type');
const value = decodeURIComponent(params.get('value') || '');

let titleIcon = '';
if (type === 'cat') { filtered = books.filter(b => b.cat === value); titleIcon = '📚'; }
else if (type === 'author') { filtered = books.filter(b => b.author === value); titleIcon = '✍️'; }
else if (type === 'pub') { filtered = books.filter(b => b.pub === value); titleIcon = '🏢'; }

document.getElementById('pageTitle').innerText = value;
document.getElementById('titleText').innerText = titleIcon + ' ' + value;

renderBooks(filtered);
</script>
