        .back-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #27ae60; margin-right: 15px; }

        .page-header p { color: #666; font-size: 14px; }

        /* Book Grid */
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .book-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; position: relative; border: 1px solid #eee; }

        .book-card-info { padding: 12px; }
        .book-card-name { font-size: 14px; font-weight: 700; color: #2c3e50; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 36px; }
        .book-card-author { font-size: 12px; color: #27ae60; margin-bottom: 8px; }
        .price-row { display: flex; align-items: center; gap: 8px; }
        .price-sell { font-size: 16px; font-weight: 700; color: #e74c3c; }
        .price-original { font-size: 12px; color: #aaa; text-decoration: line-through; }
        .discount-badge { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; z-index: 1; }
        
        @media (max-width: 480px) {
            .book-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .book-card img { height: 180px; }
        }

// ২. মেইন লজিক
function init() {
    const params = new URLSearchParams(window.location.search);
    const type = params.get('type'); 
    const value = decodeURIComponent(params.get('value') || '');
    
    let filtered = [];
    let displayTitle = value;

    if (type === 'cat' && value) {
        filtered = books.filter(b => b.cat === value);
    } else if (type === 'author' && value) {
        filtered = books.filter(b => b.author === value);
    } else if (type === 'pub' && value) {
        filtered = books.filter(b => b.pub === value);
    } else {
        // যদি কিছু না পায়, তবে সব বই দেখাবে
        filtered = books;
        displayTitle = "সব বই";
    }

    // UI আপডেট
    document.getElementById('navTitle').innerText = displayTitle;
    document.getElementById('titleText').innerText = displayTitle;
    document.getElementById('countText').innerText = filtered.length + 'টি বই পাওয়া গেছে';

    const content = document.getElementById('mainContent');
    if (filtered.length === 0) {
        content.innerHTML = `<p style="grid-column: 1/-1; text-align: center; padding: 50px; color: #888;">দুঃখিত, কোনো বই পাওয়া যায়নি।</p>`;
    } else {
        content.innerHTML = filtered.map(b => {
            // বইটির আসল ইনডেক্স খুঁজে বের করা book.html এর জন্য
            const originalIndex = books.findIndex(book => book.name === b.name);
            const pct = Math.round((b.original_price - b.price) / b.original_price * 100);
            
            return `
            <div class="book-card" onclick="window.location.href='book.html?id=${originalIndex}'">
                ${pct > 0 ? `<div class="discount-badge">${pct}% ছাড়</div>` : ''}
                <img src="${b.img}" alt="${b.name}">
                <div class="book-card-info">
                    <div class="book-card-name">${b.name}</div>
                    <div class="book-card-author">${b.author}</div>
                    <div class="price-row">
                        <span class="price-sell">৳${b.price}</span>
                        ${b.original_price > b.price ? `<span class="price-original">৳${b.original_price}</span>` : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
    }
}

// পেজ লোড হলে ফাংশনটি রান করবে
window.onload = init;
</script>
