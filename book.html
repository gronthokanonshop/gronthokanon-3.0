<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বই বিস্তারিত — গ্রন্থকানন</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #edf2f7;
            --card: #ffffff;
            --text: #333333;
            --text2: #888888;
            --border: #e0e0e0;
            --navbar-bg: #ffffff;
            --shadow: rgba(0,0,0,0.08);
            --green: #27ae60;
            --dark: #2c3e50;
            --red: #e74c3c;
            --price-bg: #f8f9fa;
        }
        [data-theme="dark"] {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --text: #e8e8e8;
            --text2: #aaaaaa;
            --border: #2a2a3e;
            --navbar-bg: #1a1a2e;
            --shadow: rgba(0,0,0,0.3);
            --price-bg: #0f0f1a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Hind Siliguri', 'SolaimanLipi', Arial, sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }

        /* NAVBAR */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: var(--navbar-bg); box-shadow: 0 2px 10px var(--shadow); position: sticky; top: 0; z-index: 100; transition: background 0.3s; }
        .navbar-brand { font-size: 18px; font-weight: 700; color: var(--green); }
        .cart-icon { position: relative; font-size: 22px; cursor: pointer; }
        .cart-badge { position: absolute; top: -8px; right: -10px; background: var(--red); color: white; font-size: 11px; padding: 2px 6px; border-radius: 50%; font-weight: bold; }
        .dark-toggle { background: none; border: 2px solid var(--border); border-radius: 20px; padding: 4px 10px; cursor: pointer; font-size: 14px; color: var(--text); transition: 0.2s; }

        .container { max-width: 500px; margin: 0 auto; padding: 16px; }

        /* BOOK IMAGE */
        .book-image-wrap { background: var(--card); border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 4px 15px var(--shadow); margin-bottom: 16px; position: relative; }
        .book-image-wrap img { width: 180px; height: 260px; object-fit: cover; border-radius: 8px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); }

        /* WISHLIST BUTTON */
        .wishlist-btn-large { position: absolute; top: 16px; right: 16px; background: var(--card); border: 2px solid var(--border); border-radius: 50%; width: 44px; height: 44px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px var(--shadow); transition: 0.2s; }
        .wishlist-btn-large:hover { transform: scale(1.1); }
        .wishlist-btn-large.active { background: #ffe0e0; border-color: #e74c3c; }

        /* BOOK INFO */
        .book-info { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px var(--shadow); margin-bottom: 16px; }
        .book-title { font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 6px; line-height: 1.3; }
        [data-theme="dark"] .book-title { color: #e8e8e8; }
        .book-author { font-size: 15px; color: var(--green); font-weight: 600; margin-bottom: 14px; cursor: pointer; }
        .book-author:hover { text-decoration: underline; }

        /* BADGES */
        .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
        .badge { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
        .badge-cat { background: #e8f5e9; color: #27ae60; border: 1px solid #c8e6c9; }
        .badge-stock-ok { background: #e8f5e9; color: #27ae60; border: 1px solid #c8e6c9; }
        .badge-stock-low { background: #fff3e0; color: #f39c12; border: 1px solid #ffe0b2; }
        .badge-stock-out { background: #fdecea; color: #e74c3c; border: 1px solid #f5c6cb; }

        /* PRICE */
        .price-section { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 14px; background: var(--price-bg); border-radius: 10px; }
        .price-sell { font-size: 28px; font-weight: 700; color: var(--red); }
        .price-original { font-size: 16px; color: var(--text2); text-decoration: line-through; }
        .price-discount { background: var(--red); color: white; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }

        /* INFO TABLE */
        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        .info-table tr { border-bottom: 1px solid var(--border); }
        .info-table td { padding: 10px 4px; font-size: 14px; }
        .info-label { color: var(--text2); width: 110px; font-weight: 500; }
        .info-value { color: var(--text); font-weight: 600; }

        /* DESCRIPTION */
        .desc-card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px var(--shadow); margin-bottom: 16px; }
        .desc-card h3 { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
        [data-theme="dark"] .desc-card h3 { color: #e8e8e8; }
        .desc-text { font-size: 14px; color: var(--text2); line-height: 1.8; }

        /* BUTTONS */
        .btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-wishlist { width: 100%; padding: 12px; background: var(--card); color: var(--red); border: 2px solid var(--red); border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Hind Siliguri', Arial, sans-serif; transition: 0.2s; margin-bottom: 10px; }
        .btn-wishlist:hover { background: #ffe0e0; }
        .btn-wishlist.active { background: #ffe0e0; }
        .btn-cart { flex: 1; padding: 14px; background: var(--card); color: var(--green); border: 2px solid var(--green); border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Hind Siliguri', Arial, sans-serif; transition: 0.2s; }
        .btn-cart:hover { background: #f0faf4; }
        .btn-buy { flex: 1; padding: 14px; background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Hind Siliguri', Arial, sans-serif; box-shadow: 0 5px 15px rgba(39,174,96,0.3); transition: 0.2s; }
        .btn-buy:hover { transform: translateY(-2px); }
        .btn-disabled { background: #ccc !important; color: #888 !important; border-color: #ccc !important; cursor: not-allowed !important; box-shadow: none !important; transform: none !important; }

        /* RELATED */
        .related-card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px var(--shadow); margin-bottom: 30px; }
        .related-card h3 { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
        [data-theme="dark"] .related-card h3 { color: #e8e8e8; }
        .related-row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: thin; }
        .related-book { flex-shrink: 0; width: 110px; cursor: pointer; transition: 0.2s; }
        .related-book:hover { transform: translateY(-3px); }
        .related-book img { width: 110px; height: 150px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 6px; }
        .related-book-name { font-size: 11px; font-weight: 600; color: var(--text); line-height: 1.3; text-align: center; }
        .related-book-price { font-size: 12px; color: var(--red); font-weight: 700; text-align: center; margin-top: 3px; }

        /* TOAST */
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #2c3e50; color: white; padding: 12px 24px; border-radius: 25px; font-size: 14px; font-weight: 600; display: none; z-index: 9999; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    </style>
</head>

    </div>

    <!-- DESCRIPTION -->

    </div>

        <div class="related-row" id="relatedBooks"></div>

</div>

  { name: "পর্দা নারীর অলংকার", author: "মুহাম্মদ যাইনুল আবিদীন", price: 60, original_price: 120, cat: "জনপ্রিয় বই", pub: "মাকতাবাতুল আযহার", pages: "পৃষ্ঠা", stock: "10 কপি", img: "y4", desc: "শীঘ্রই আপডেট করা হবে" },
];

let cart = JSON.parse(localStorage.getItem('gronthokanon_cart')) || [];
let wishlist = JSON.parse(localStorage.getItem('gronthokanon_wishlist')) || [];
let currentBook = null;
let currentIdx = -1;

// DARK MODE
function toggleDarkMode() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('darkBtn').innerText = isDark ? '🌙' : '☀️';
    localStorage.setItem('gronthokanon_theme', isDark ? 'light' : 'dark');
}
const savedTheme = localStorage.getItem('gronthokanon_theme');
if (savedTheme) {
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('darkBtn').innerText = savedTheme === 'dark' ? '☀️' : '🌙';
}

function updateCartCount() {
    document.getElementById('cartCount').innerText = cart.length;
}

function discountPct(b) {
    if (b.original_price > b.price) return Math.round((b.original_price - b.price) / b.original_price * 100);
    return 0;
}

function updateWishlistUI() {
    const isWl = wishlist.includes(currentBook?.name);
    const btnLarge = document.getElementById('wishlistBtnLarge');
    const btn = document.getElementById('wishlistBtn');
    if (btnLarge) { btnLarge.innerText = isWl ? '❤️' : '🤍'; btnLarge.classList.toggle('active', isWl); }
    if (btn) { btn.innerHTML = isWl ? '❤️ উইশলিস্ট থেকে সরান' : '🤍 উইশলিস্টে যোগ করুন'; btn.classList.toggle('active', isWl); }
}

function toggleWishlist() {
    if (!currentBook) return;
    if (wishlist.includes(currentBook.name)) {
        wishlist = wishlist.filter(w => w !== currentBook.name);
    } else {
        wishlist.push(currentBook.name);
        showToast('❤️ উইশলিস্টে যোগ হয়েছে!');
    }
    localStorage.setItem('gronthokanon_wishlist', JSON.stringify(wishlist));
    updateWishlistUI();
}

function loadBook() {
    const params = new URLSearchParams(window.location.search);
    const idx = parseInt(params.get('id'));
    if (isNaN(idx) || !books[idx]) { window.location.href = 'index.html'; return; }

    currentIdx = idx;
    currentBook = books[idx];
    const b = currentBook;
    const stockNum = parseInt(b.stock);
    const inStock = stockNum > 0;
    const pct = discountPct(b);

    // Save to recently viewed
    let recent = JSON.parse(localStorage.getItem('gronthokanon_recent')) || [];
    recent = [idx, ...recent.filter(i => i !== idx)].slice(0, 8);
    localStorage.setItem('gronthokanon_recent', JSON.stringify(recent));

    document.title = b.name + ' — গ্রন্থকানন';
    document.getElementById('bookImg').src = b.img;
    document.getElementById('bookTitle').innerText = b.name;
    document.getElementById('bookAuthor').innerText = '✍️ ' + b.author;
    document.getElementById('bookPrice').innerText = '৳ ' + b.price;
    document.getElementById('bookPub').innerText = b.pub;
    document.getElementById('bookPages').innerText = b.pages;
    document.getElementById('bookSubject').innerText = b.subject;
    document.getElementById('bookDesc').innerText = b.desc || 'বইটি সম্পর্কে বিস্তারিত শীঘ্রই যোগ করা হবে।';

    // Author click → filter
    document.getElementById('bookAuthor').onclick = () => {
        window.location.href = `filter.html?type=author&value=${encodeURIComponent(b.author)}`;
    };

    // Original price
    const origEl = document.getElementById('bookOrigPrice');
    if (b.original_price > b.price) origEl.innerText = '৳ ' + b.original_price;
    else origEl.style.display = 'none';

    // Discount badge
    const discEl = document.getElementById('bookDiscount');
    if (pct > 0) discEl.innerText = pct + '% ছাড়';
    else discEl.style.display = 'none';

    // Badges
    const badgesEl = document.getElementById('bookBadges');
    badgesEl.innerHTML = `<span class="badge badge-cat">📚 ${b.cat}</span>`;
    if (!inStock) {
        badgesEl.innerHTML += `<span class="badge badge-stock-out">❌ স্টক শেষ</span>`;
    } else if (stockNum <= 3) {
        badgesEl.innerHTML += `<span class="badge badge-stock-low">⚠️ মাত্র ${stockNum} কপি বাকি!</span>`;
    } else {
        badgesEl.innerHTML += `<span class="badge badge-stock-ok">✅ স্টক আছে</span>`;
    }

    // Buttons
    if (!inStock) {
        document.getElementById('btnCart').classList.add('btn-disabled');
        document.getElementById('btnCart').disabled = true;
        document.getElementById('btnBuy').classList.add('btn-disabled');
        document.getElementById('btnBuy').disabled = true;
    }

    // Wishlist UI
    updateWishlistUI();

    // Related books
    const related = books.filter((rb, i) => rb.author === b.author && i !== idx).slice(0, 8);
    const relatedEl = document.getElementById('relatedBooks');
    if (related.length === 0) {
        relatedEl.parentElement.style.display = 'none';
    } else {
        relatedEl.innerHTML = related.map(rb => {
            const ri = books.indexOf(rb);
            return `
                <div class="related-book" onclick="window.location.href='book.html?id=${ri}'">
                    <img src="${rb.img}" alt="${rb.name}" loading="lazy">
                    <div class="related-book-name">${rb.name}</div>
                    <div class="related-book-price">৳ ${rb.price}</div>
                </div>`;
        }).join('');
    }

    updateCartCount();
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg || '✅ কার্টে যোগ হয়েছে!';
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);
}

function addToCartAndShow() {
    if (!currentBook) return;
    cart.push({ name: currentBook.name, price: currentBook.price, img: currentBook.img });
    localStorage.setItem('gronthokanon_cart', JSON.stringify(cart));
    updateCartCount();
    showToast('✅ কার্টে যোগ হয়েছে!');
}

function buyNow() {
    if (!currentBook) return;
    cart.push({ name: currentBook.name, price: currentBook.price, img: currentBook.img });
    localStorage.setItem('gronthokanon_cart', JSON.stringify(cart));
    localStorage.setItem('gronthokanon_opencart', '1');
    window.location.href = 'index.html';
}

function goToCart() {
    localStorage.setItem('gronthokanon_opencart', '1');
    window.location.href = 'index.html';
}

function goBack() {
    window.history.back();
}

window.onload = loadBook;
</script>
</body>
</html>
