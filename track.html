<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>অর্ডার ট্র্যাক — গ্রন্থকানন</title>
    <meta name="theme-color" content="#ffffff">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <script>!function(){var t=localStorage.getItem('gronthokanon_theme');if(t)document.documentElement.setAttribute('data-theme',t);}();</script>
    <style>
        body{-webkit-tap-highlight-color:transparent;font-family:'Hind Siliguri',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
        .navbar-title{flex:1;font-size:15px;font-weight:700;color:var(--text);}
        .page-wrap{padding:16px;max-width:480px;margin:0 auto;padding-bottom:60px;}
        .track-search{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px var(--shadow);}
        .track-search h3{font-size:16px;margin-bottom:4px;color:var(--text);}
        .track-search p{font-size:12px;color:var(--text2);margin-bottom:14px;}
        .track-input-row{display:flex;gap:8px;}
        .track-input{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-family:'Hind Siliguri',Arial,sans-serif;font-size:14px;outline:none;}
        .track-input:focus{border-color:#059669;}
        .track-btn{padding:11px 18px;background:#059669;color:white;border:none;border-radius:10px;font-family:'Hind Siliguri',Arial,sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
        .track-tabs{display:flex;gap:8px;margin-bottom:16px;}
        .ttab{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-family:'Hind Siliguri',Arial,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;}
        .ttab.active{background:#059669;color:white;border-color:#059669;}
        .my-order-item{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 10px var(--shadow);cursor:pointer;border:1.5px solid var(--border);transition:.2s;}
        .my-order-item:hover{border-color:#059669;}
        .my-order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
        .my-oid{font-size:13px;font-weight:800;color:#059669;}
        .my-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
        .my-info{font-size:12px;color:var(--text2);line-height:1.7;}
        .order-card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 2px 12px var(--shadow);margin-bottom:14px;display:none;}
        .order-id-badge{display:inline-block;background:#ecfdf5;color:#059669;border:1.5px solid #a7f3d0;border-radius:20px;padding:4px 14px;font-size:12px;font-weight:800;letter-spacing:1px;margin-bottom:14px;}
        .order-info-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);}
        .order-info-row:last-child{border:none;}
        .order-info-row span:first-child{color:var(--text2);}
        .order-info-row span:last-child{font-weight:600;color:var(--text);}
        .timeline{margin-top:20px;}
        .timeline-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:14px;text-transform:uppercase;letter-spacing:0.05em;}
        .tl-step{display:flex;gap:14px;margin-bottom:0;position:relative;}
        .tl-left{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;}
        .tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;z-index:1;}
        .tl-dot.done{background:#059669;color:white;}
        .tl-dot.active{background:#059669;color:white;box-shadow:0 0 0 4px rgba(5,150,105,0.2);}
        .tl-dot.pending{background:var(--bg);border:2px solid var(--border);color:var(--text2);}
        .tl-line{width:2px;flex:1;background:var(--border);margin:2px 0;}
        .tl-line.done{background:#059669;}
        .tl-right{padding:4px 0 20px;}
        .tl-label{font-size:14px;font-weight:700;color:var(--text);}
        .tl-label.pending-txt{color:var(--text2);}
        .tl-sub{font-size:11px;color:var(--text2);margin-top:2px;}
        .track-error{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:12px;padding:14px;color:#dc2626;font-size:13px;text-align:center;display:none;margin-bottom:14px;}
        .loading-spinner{text-align:center;padding:20px;color:var(--text2);font-size:13px;}
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-top">
        <button class="back-btn" onclick="navigateTo('index.html')">‹</button>
        <span class="navbar-title">অর্ডার ট্র্যাক করুন</span>
        <button class="dark-pill" onclick="toggleDark()" id="darkBtn"><svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
    </div>
</nav>

<div class="page-wrap">

    <div class="track-tabs">
        <button class="ttab active" id="tab1" onclick="switchTab('id')"><svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> ID দিয়ে খুঁজুন</button>
        <button class="ttab" id="tab2" onclick="switchTab('phone')"><svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg> আমার অর্ডারসমূহ</button>
    </div>

    <!-- Search by Order ID -->
    <div id="panelId">
        <div class="track-search">
            <h3><svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21,8 21,21 3,21 3,8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg> অর্ডার খুঁজুন</h3>
            <p>অর্ডার কনফার্মের পর আপনি যে ID পেয়েছেন সেটি লিখুন</p>
            <div class="track-input-row">
                <input class="track-input" id="trackInput" placeholder="যেমন: GK-ABC123" oninput="this.value=this.value.toUpperCase()">
                <button class="track-btn" onclick="searchOrder()">খুঁজুন</button>
            </div>
        </div>
        <div class="track-error" id="trackError"><svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> এই ID দিয়ে কোনো অর্ডার পাওয়া যায়নি</div>
        <div class="order-card" id="orderCard">
            <div id="orderIdBadge" class="order-id-badge"></div>
            <div id="orderInfoRows"></div>
            <div class="timeline">
                <div class="timeline-title">অর্ডার অবস্থান</div>
                <div id="timelineSteps"></div>
            </div>
        </div>
        <div id="lastOrderHint" style="text-align:center;padding:10px;font-size:12px;color:var(--text2);"></div>
    </div>

    <!-- Search by Phone -->
    <div id="panelPhone" style="display:none;">
        <div class="track-search">
            <h3><svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg> আমার সব অর্ডার</h3>
            <p>আপনার মোবাইল নম্বর দিয়ে সকল অর্ডার দেখুন</p>
            <div class="track-input-row">
                <input class="track-input" id="phoneInput" placeholder="01XXXXXXXXX" type="tel" maxlength="11">
                <button class="track-btn" onclick="searchByPhone()">দেখুন</button>
            </div>
        </div>
        <div class="track-error" id="phoneError"><svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> এই নম্বরে কোনো অর্ডার পাওয়া যায়নি</div>
        <div id="myOrdersList"></div>
    </div>

</div>

<script>
const DB = 'https://gronthokanon-8573e-default-rtdb.firebaseio.com';

function escapeHTML(str){
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function fbGet(path){
    const res = await fetch(DB + path + '.json', {
        method: 'GET',
        headers: {'Accept': 'application/json'}
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
}

const STATUSES=[
    {key:'pending',   icon:'<svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>', label:'অর্ডার গৃহীত',      sub:'আপনার অর্ডারটি আমরা পেয়েছি'},
    {key:'confirmed', icon:'<svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>', label:'অর্ডার কনফার্ম',     sub:'অর্ডার নিশ্চিত করা হয়েছে'},
    {key:'processing',icon:'<svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21,8 21,21 3,21 3,8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>', label:'প্যাকেজিং',          sub:'বই প্যাক করা হচ্ছে'},
    {key:'shipped',   icon:'<svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16,8 20,8 23,11 23,16 16,16 16,8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>', label:'ডেলিভারিতে',         sub:'বই রওনা দিয়েছে'},
    {key:'delivered', icon:'<svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>', label:'ডেলিভারি সম্পন্ন',  sub:'আপনার কাছে পৌঁছে গেছে'},
];
const STATUS_LABELS={pending:'পেন্ডিং',confirmed:'কনফার্ম',processing:'প্যাকেজিং',shipped:'শিপড',delivered:'ডেলিভারড'};
const STATUS_COLORS={pending:'background:#fef3c7;color:#92400e;',confirmed:'background:#dbeafe;color:#1e40af;',processing:'background:#ede9fe;color:#5b21b6;',shipped:'background:#fff7ed;color:#9a3412;',delivered:'background:#ecfdf5;color:#065f46;'};

function switchTab(tab){
    const isId=tab==='id';
    document.getElementById('panelId').style.display=isId?'block':'none';
    document.getElementById('panelPhone').style.display=isId?'none':'block';
    document.getElementById('tab1').classList.toggle('active',isId);
    document.getElementById('tab2').classList.toggle('active',!isId);
}

async function searchOrder(){
    const id=document.getElementById('trackInput').value.trim();
    if(!id){showToast('অর্ডার ID লিখুন','#dc2626');return;}
    document.getElementById('trackError').style.display='none';
    document.getElementById('orderCard').style.display='none';
    try{
        const data = await fbGet('/orders/' + encodeURIComponent(id));
        if(!data){document.getElementById('trackError').style.display='block';return;}
        renderOrder(data);
    }catch(e){
        console.error(e);
        showToast('সংযোগ সমস্যা হয়েছে, আবার চেষ্টা করুন','#dc2626');
    }
}

async function searchByPhone(){
    const phone=document.getElementById('phoneInput').value.trim();
    if(!phone||!/^01[3-9]\d{8}$/.test(phone)){
        showToast('সঠিক মোবাইল নম্বর দিন!','#dc2626');return;
    }
    document.getElementById('phoneError').style.display='none';
    document.getElementById('myOrdersList').innerHTML='<div class="loading-spinner">খোঁজা হচ্ছে...</div>';
    try{
        const idx = await fbGet('/phoneIndex/' + phone);
        if(!idx){
            document.getElementById('myOrdersList').innerHTML='';
            document.getElementById('phoneError').style.display='block';
            return;
        }
        const orderIds = Object.keys(idx);

        // Promise.allSettled — একটা fail করলেও বাকিগুলো চলবে
        const results = await Promise.allSettled(
            orderIds.map(oid => fbGet('/orders/' + encodeURIComponent(oid)))
        );
        let orders = results
            .filter(r => r.status === 'fulfilled' && r.value !== null)
            .map(r => r.value);
        orders.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

        if(!orders.length){
            document.getElementById('myOrdersList').innerHTML='';
            document.getElementById('phoneError').style.display='block';
            return;
        }
        renderMyOrders(orders);
    }catch(e){
        console.error(e);
        showToast('সংযোগ সমস্যা হয়েছে, আবার চেষ্টা করুন','#dc2626');
        document.getElementById('myOrdersList').innerHTML='';
    }
}

function renderMyOrders(orders){
    const el=document.getElementById('myOrdersList');
    el.innerHTML=orders.map(o=>`
        <div class="my-order-item" data-orderid="${escapeHTML(o.orderId)}" onclick="viewOrder(this.dataset.orderid)">
            <div class="my-order-top">
                <div class="my-oid">${escapeHTML(o.orderId)}</div>
                <span class="my-status" style="${STATUS_COLORS[o.status]||STATUS_COLORS.pending}">${STATUS_LABELS[o.status]||escapeHTML(o.status)}</span>
            </div>
            <div class="my-info">
                <svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> ${escapeHTML(o.books)}<br>
                <svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> <strong>${escapeHTML(o.total)}</strong> · <svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> ${escapeHTML(o.payment)}<br>
                <svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${new Date(o.createdAt).toLocaleDateString('bn-BD')}
            </div>
        </div>
    `).join('');
}

function viewOrder(id){
    switchTab('id');
    document.getElementById('trackInput').value=id;
    searchOrder();
}
function fillLastOrder(id){document.getElementById('trackInput').value=id;}
function renderOrder(o){
    document.getElementById('orderIdBadge').innerText=o.orderId;
    const discRow=o.discount>0?`<div class="order-info-row"><span>ছাড় (${escapeHTML(o.coupon||'')})</span><span style="color:#dc2626;">-৳${o.discount}</span></div>`:'';
    document.getElementById('orderInfoRows').innerHTML=`
        <div class="order-info-row"><span>নাম</span><span>${(()=>{const n=o.name||'';return n.length>2?escapeHTML(n[0]+'*'.repeat(n.length-2)+n[n.length-1]):escapeHTML(n);})()}</span></div>
        <div class="order-info-row"><span>ফোন</span><span>${(()=>{const p=o.phone||'';return escapeHTML(p.length>5?p.slice(0,3)+'*'.repeat(p.length-5)+p.slice(-2):p);})()}</span></div>
        <div class="order-info-row"><span>ঠিকানা</span><span style="text-align:right;max-width:200px;">${escapeHTML(o.address)}</span></div>
        <div class="order-info-row"><span>পেমেন্ট</span><span>${escapeHTML(o.payment)}</span></div>
        <div class="order-info-row"><span>বই</span><span style="text-align:right;max-width:200px;">${escapeHTML(o.books)}</span></div>
        ${discRow}
        <div class="order-info-row"><span>মোট</span><span style="color:#059669;font-size:15px;">${escapeHTML(o.total)}</span></div>
    `;
    const curIdx=STATUSES.findIndex(s=>s.key===o.status);
    let html='';
    STATUSES.forEach((s,i)=>{
        const isDone=i<curIdx;
        const isActive=i===curIdx;
        const dotClass=isDone?'done':isActive?'active':'pending';
        const labelClass=isDone||isActive?'':'pending-txt';
        const showLine=i<STATUSES.length-1;
        html+=`<div class="tl-step">
            <div class="tl-left">
                <div class="tl-dot ${dotClass}">${isDone?'<svg style="width:1em;height:1em;vertical-align:-0.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>':s.icon}</div>
                ${showLine?`<div class="tl-line ${isDone?'done':''}"></div>`:''}
            </div>
            <div class="tl-right">
                <div class="tl-label ${labelClass}">${s.label}</div>
                <div class="tl-sub">${s.sub}</div>
            </div>
        </div>`;
    });
    document.getElementById('timelineSteps').innerHTML=html;
    document.getElementById('orderCard').style.display='block';
}

window.onload=function(){
    const urlId=new URLSearchParams(window.location.search).get('id');
    const lastId=localStorage.getItem('gronthokanon_lastorder');
    if(urlId){
        document.getElementById('trackInput').value=urlId;
        searchOrder();
    } else if(lastId){
        document.getElementById('lastOrderHint').innerHTML=`আপনার সর্বশেষ অর্ডার: <strong style="color:#059669;cursor:pointer;" data-id="${escapeHTML(lastId)}" onclick="fillLastOrder(this.dataset.id)">${escapeHTML(lastId)}</strong>`;
    }
};
</script>
<script src="common.js"></script>
</body>
</html>
